$schema: https://azuremlschemas.azureedge.net/promptflow/latest/Flow.schema.json
environment:
  python_requirements_txt: requirements.txt
inputs:
  chat_history:
    type: list
    is_chat_history: true
    default: []
  question:
    type: string
    is_chat_input: true
outputs:
  answer:
    type: string
    reference: ${executor_node.output}
    is_chat_output: true
nodes:
- name: data_loader
  type: python
  source:
    type: code
    path: ../promptflow/lkg_sources/data_loader.py
  inputs: {}
- name: code_gen_node
  type: custom_llm
  source:
    type: package_with_prompt
    tool: promptflow.tools.llm.llm
    path: ../promptflow/lkg_sources/code_gen_node.jinja2
  inputs:
    connection: Dwaraka_Test_project
    api: chat
    response_format:
      type: text
    schema: ${data_loader.output.schema}
    question: ${inputs.question}
    sample_data: ${data_loader.output.sample_data}
- name: executor_node
  type: python
  source:
    type: code
    path: ../promptflow/lkg_sources/executor_node.py
  inputs:
    code: ${code_gen_node.output}
